  <div class="chat-container">
    <div class="chat-input-wrapper">
      <input id="fileInput" type="file" accept=".pdf,.doc,.docx,.txt,.csv,.xls,.xlsx,.ppt,.pptx,.json,.xml,.md,.py,.js,.ts,.html,.css,.zip,.log,.ini,.conf,.sql,.java,.c,.cpp,.h,.go,.rs,.kt,.swift,.rb,.php" hidden multiple>

      <div class="file-pills-area hidden" id="filePillsArea"></div>

      <div class="input-row">
        <textarea
          class="chat-input"
          id="chatInput"
          placeholder="Pesan Nekograf AI"
          rows="1"
        ></textarea>

        <div class="limit-banner hidden" id="limitBanner">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4M12 16h.01"></path></svg>
          <span>Batas limit anda sudah tercapai. Isi ulang dalam <span id="limitBannerCountdown" style="font-family:ui-monospace,monospace;font-weight:700">00:00:00</span>.</span>
        </div>

        <div class="right-actions">
          <button class="attach-btn" id="plusBtn" type="button" aria-label="Lampirkan file">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
            </svg>
          </button>

          <button class="send-btn disabled" id="actionBtn" type="button" disabled aria-label="Kirim">
            <svg class="send-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M12 19V5M5 12l7-7 7 7"></path>
            </svg>
            <svg class="stop-icon" fill="currentColor" viewBox="0 0 24 24" style="display:none">
              <rect x="6" y="6" width="12" height="12" rx="2"></rect>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <div class="toast-text" id="toastText">Fiture ini masih dalam pemeliharaan</div>
    <button class="toast-close" id="toastClose" type="button">✕</button>
  </div>

  <script src="devaccount.js"></script>
  <script src="script.js"></script>
  <script>
    (function() {
      function getGreeting() {
        var hour = new Date().getHours();
        if (hour >= 5 && hour < 11) return "Apa yang bisa saya bantu pagi ini?";
        if (hour >= 11 && hour < 15) return "Apa yang bisa saya bantu siang ini?";
        if (hour >= 15 && hour < 18) return "Apa yang bisa saya bantu sore ini?";
        return "Apa yang bisa saya bantu malam ini?";
      }
      var el = document.getElementById("welcomeGreeting");
      if (el) el.textContent = getGreeting();
    })();

    (function() {
      var dpr = window.devicePixelRatio || 1;
      var vw  = window.innerWidth;
      var vh  = window.innerHeight;
      var physW = vw * dpr;
      var baseSize;

      if (physW >= 2560) {
        baseSize = 18;
      } else if (physW >= 1920) {
        baseSize = 17;
      } else if (physW >= 1280) {
        baseSize = 16;
      } else if (physW >= 1080) {
        baseSize = 16;
      } else if (physW >= 750) {
        baseSize = 15.5;
      } else if (physW >= 640) {
        baseSize = 15;
      } else {
        baseSize = 14.5;
      }

      if (dpr >= 3.5 && vw <= 430) {
        baseSize += 0.5;
      }

      document.documentElement.style.fontSize = baseSize + 'px';

      document.documentElement.style.setProperty('--dpr', dpr);
      document.documentElement.style.setProperty('--phys-w', physW + 'px');

      var resizeTimer;
      window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
          var newDpr = window.devicePixelRatio || 1;
          var newVw  = window.innerWidth;
          var newPhysW = newVw * newDpr;
          var newBase;
          if (newPhysW >= 2560)      newBase = 18;
          else if (newPhysW >= 1920) newBase = 17;
          else if (newPhysW >= 1280) newBase = 16;
          else if (newPhysW >= 1080) newBase = 16;
          else if (newPhysW >= 750)  newBase = 15.5;
          else if (newPhysW >= 640)  newBase = 15;
          else                       newBase = 14.5;
          if (newDpr >= 3.5 && newVw <= 430) newBase += 0.5;
          document.documentElement.style.fontSize = newBase + 'px';
          document.documentElement.style.setProperty('--dpr', newDpr);
          document.documentElement.style.setProperty('--phys-w', newPhysW + 'px');
        }, 150);
      });
    })();
  </script>
</body>
